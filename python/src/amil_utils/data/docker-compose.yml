# Ephemeral Odoo + PostgreSQL for module validation
# Usage: MODULE_PATH=/path/to/module MODULE_NAME=module_name docker compose up
# Set ODOO_MAJOR_VERSION to target a specific Odoo release (default: 19).
services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${FACTORY_DB_PASSWORD:?Set FACTORY_DB_PASSWORD env var}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  odoo:
    image: odoo:${ODOO_MAJOR_VERSION:-19}
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: ${FACTORY_DB_PASSWORD:?Set FACTORY_DB_PASSWORD env var}
    volumes:
      - ${MODULE_PATH:-.}:/mnt/extra-addons/${MODULE_NAME:-module}:ro
    configs:
      - source: odoo_conf
        target: /etc/odoo/odoo.conf

configs:
  odoo_conf:
    file: ./odoo.conf
